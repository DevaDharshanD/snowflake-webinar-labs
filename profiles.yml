# ============================================
# UPDATE THESE VALUES FROM YOUR .env FILE
# SNOWFLAKE_ROLE, SNOWFLAKE_WAREHOUSE, SNOWFLAKE_DATABASE, SNOWFLAKE_SCHEMA
# ============================================
first_dbt_project:
  target: dev
  outputs:
    dev:
      type: snowflake
      role: ACCOUNTADMIN              # .env: SNOWFLAKE_ROLE
      warehouse: COMPUTE_WH           # .env: SNOWFLAKE_WAREHOUSE
      database: DEMO_DB               # .env: SNOWFLAKE_DATABASE
      schema: DEMO_SCHEMA             # .env: SNOWFLAKE_SCHEMA
      threads: 8
